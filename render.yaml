services:
  - type: web
    name: greenway-ai-backend
    root: ./backend
    runtime: python
    pythonVersion: 3.11
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn api.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: FLASK_ENV
        scope: runtime
        value: production
      - key: CORS_ORIGINS
        scope: runtime
        value: https://greenway-ai.onrender.com,https://greenway-ai.vercel.app,http://localhost:8080,http://localhost:5173
      - key: PYTHONUNBUFFERED
        scope: runtime
        value: "true"
